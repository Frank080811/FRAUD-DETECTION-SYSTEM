services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - rabbitmq
      - postgres

  alert-worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    command: ["python", "workers/alert_worker.py"]
    env_file:
      - .env
    depends_on:
      - rabbitmq

  auth-worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    command: ["python", "workers/auth_worker.py"]
    env_file:
      - .env
    depends_on:
      - rabbitmq

  audit-worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    command: ["python", "workers/audit_worker.py"]
    env_file:
      - .env
    depends_on:
      - rabbitmq
      - postgres

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: fraud
      POSTGRES_PASSWORD: fraud
      POSTGRES_DB: frauddb
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fraud -d frauddb"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
