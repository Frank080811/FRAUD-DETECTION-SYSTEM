version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - rabbitmq
      - postgres

  alert-worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    command: ["python", "workers/alert_worker.py"]
    env_file:
      - .env
    depends_on:
      - rabbitmq

  auth-worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    command: ["python", "workers/auth_worker.py"]
    env_file:
      - .env
    depends_on:
      - rabbitmq

  audit-worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    command: ["python", "workers/audit_worker.py"]
    env_file:
      - .env
    depends_on:
      - rabbitmq
      - postgres

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: fraud
      POSTGRES_PASSWORD: fraud
      POSTGRES_DB: frauddb
    ports:
      - "5432:5432"